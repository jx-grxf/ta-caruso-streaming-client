version: 2
updates:
  - package-ecosystem: npm
    directory: /
    groups:
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"
      development-dependencies:
        dependency-type: development
        patterns:
          - "*"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
